backend:
  name: github
  repo: ehill-media/edocs
  branch: main

# ===== MEDIA CONFIG FIX =====
media_folder: "public/assets"       # Physischer Ordner im Repo, wo das CMS Bilder speichert
public_folder: "/assets"            # Der Pfad, den das CMS in die Markdown-Datei schreibt (wichtig für Astro)
# ============================

content:
  - name: blog
    label: Papers & Posts
    type: collection
    path: "src/content/blog"
    format: "yaml-frontmatter"
    filename: "{{year}}-{{month}}-{{day}}-{{slug}}" # Fix: Nutze CMS-Tags {{}} statt Klammern {} für korrekte Benennung
    extension: "md"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    
    view:
      fields: [title, pubDatetime, draft]
      primary: title
      sort: [pubDatetime]
      order: desc

    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: author, label: Author, type: string, default: "Your Name" }
      - { name: pubDatetime, label: Publication Date, type: datetime, required: true }
      - { name: modDatetime, label: Last Modified Date, type: datetime, required: false }
      - { name: description, label: Short Summary / Abstract, type: string, required: true }
      - { name: tags, label: Tags, type: list }
      - { name: ogImage, label: Social Share Image (OG Image), type: image, required: false } # Nutzt jetzt /assets/bild.jpg
      - { name: draft, label: Save as Draft?, type: boolean, default: false }
      - { name: body, label: Paper Content, type: rich-text }