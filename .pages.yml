backend:
  name: github
  repo: ehill-media/edocs
  branch: main

# 🔥 GLOBALE MEDIEN-PFADE (Müssen ganz oben auf Root-Ebene stehen)
media_folder: "public/assets"
public_folder: "/assets"

# 🔥 REPARIERT: Decap CMS erwartet 'collections', nicht 'content'
collections:
  - name: blog
    label: Papers & Posts
    type: folder # Nutze 'folder' für lokale Markdown-Sammlungen
    folder: "src/content/blog" # 'folder' bestimmt das Zielverzeichnis
    format: "yaml-frontmatter"
    extension: "md"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    filename: "{{year}}-{{month}}-{{day}}-{{slug}}"
    
    view:
      fields: [title, pubDatetime, draft]
      primary: title
      sort: [pubDatetime]
      order: desc

    fields:
      - { name: title, label: Title, type: string, required: true }
      - { name: author, label: Author, type: string, default: "Your Name" }
      - { name: pubDatetime, label: Publication Date, type: datetime, required: true }
      - { name: modDatetime, label: Last Modified Date, type: datetime, required: false }
      - { name: description, label: Short Summary / Abstract, type: string, required: true }
      - { name: tags, label: Tags, type: list }
      - { name: ogImage, label: Social Share Image (OG Image), type: image, required: false }
      - { name: draft, label: Save as Draft?, type: boolean, default: false }
      - { name: body, label: Paper Content, type: rich-text }