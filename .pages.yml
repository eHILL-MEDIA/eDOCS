# Medien-Verzeichnis (Astro legt statische Medien in "public")
media:
  input: public/assets
  output: /assets

# Inhalts-Typen für AstroPaper
items:
  - type: collection
    name: blog
    label: 📝 Blog & Dokumente
    path: src/content/blog
    filename: "{year}-{month}-{day}-{slug}.md"
    extension: md
    format: frontmatter 
    fields:
      - name: title
        type: string
        label: Titel
        required: true
      - name: author
        type: string
        label: Autor
        default: "Sat Naing" # Oder dein Name/Firma
      - name: pubDatetime
        type: date
        label: Veröffentlichungsdatum (ISO)
        default: now
        required: true
      - name: modDatetime
        type: date
        label: Letztes Update (Optional)
      - name: postSlug
        type: string
        label: Eigener URL-Slug (Optional)
      - name: featured
        type: boolean
        label: Auf Startseite hervorheben?
        default: false
      - name: draft
        type: boolean
        label: Als Entwurf speichern?
        default: false
      - name: tags
        type: list
        label: Tags / Schlagworte
        default: ["allgemein"]
      - name: description
        type: string
        label: Kurzbeschreibung (SEO)
        required: true
      - name: body
        type: rich-text
        label: Inhalt (Markdown Editor)
        required: true

# Website-Einstellungen (falls du die site.json nutzt, sonst weglassen)
  - type: file
    name: site
    label: ⚙️ Website Einstellungen
    path: src/_data/site.json
    format: json
    fields:
      - name: title
        type: string
        label: Website Name
        required: true
      - name: description
        type: text
        label: Beschreibung

# Verbindung zur GitHub Action für Astro
actions:
  - name: eDOCS
    label: 🚀 eDOCS live schalten (Build & Deploy)
    workflow: edocs