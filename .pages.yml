# Medien-Verzeichnis
media:
  input: public/media
  output: /media

# Inhaltstypen
items:
  - type: collection
    name: blog
    label: 📝 Dokumente & Posts
    path: src/content/blog
    filename: "{year}-{month}-{day}-{slug}.md"
    extension: md
    format: frontmatter
    fields:
      - name: title
        type: string
        label: Titel
        required: true
      - name: pubDatetime
        type: date
        label: Veröffentlichungsdatum
        default: now
      - name: author
        type: string
        label: Autor
        default: "eHILL MEDIA"
      - name: description
        type: string
        label: Kurzbeschreibung (SEO)
        required: true
      - name: postSlug
        type: string
        label: URL-Slug (z.B. mein-beitrag)
      - name: featured
        type: boolean
        label: Auf Startseite hervorheben?
        default: false
      - name: draft
        type: boolean
        label: Als Entwurf speichern?
        default: false

  - type: file
    name: site
    label: ⚙️ Website Einstellungen
    path: src/_data/site.json
    format: json
    fields:
      - name: title
        type: string
        label: Website Name (Titel)
        required: true
      - name: description
        type: text
        label: Globale Beschreibung
      - name: url
        type: string
        label: Website URL
        placeholder: "https://docs.ehill.de"

# Automatisierung nach dem Speichern
actions:
  - name: eDOCS
    label: 🚀 eDOCS live schalten (Build & Deploy)
    workflow: edocs